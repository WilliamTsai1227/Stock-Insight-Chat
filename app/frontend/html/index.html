<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Insight Chat | AI Investment Analyst</title>
    <link rel="stylesheet" href="../css/index.css">
    <!-- Google Fonts: Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- 左側側欄: 專案與聊天列表 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="trending-up"></i>
                    <span>StockInsight</span>
                </div>
                <button id="new-project-btn" class="icon-btn" title="新增專案">
                    <i data-lucide="folder-plus"></i>
                </button>
            </div>
            
            <div class="project-list-container">
                <h3>PROJECTS</h3>
                <ul id="project-list" class="sidebar-list">
                    <!-- 專案項目動態插入 -->
                </ul>
            </div>

            <div class="chat-list-container">
                <h3>CHATS</h3>
                <ul id="chat-list" class="sidebar-list">
                    <!-- 聊天項目動態插入 -->
                </ul>
                <button id="new-chat-btn" class="new-entry-btn">
                    <i data-lucide="plus"></i> New Chat
                </button>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">U</div>
                    <span>使用者</span>
                </div>
            </div>
        </aside>

        <!-- 主內容區: 聊天界面 -->
        <main class="main-content">
            <header class="chat-header">
                <div class="chat-title-info">
                    <h2 id="current-chat-title">歡迎回來</h2>
                    <span id="chat-status" class="status-badge">Ready</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn"><i data-lucide="share-2"></i></button>

                    <!-- 使用者頭像 & 下拉選單 -->
                    <div class="user-menu" id="user-menu-trigger">
                        <div class="user-avatar-btn" id="user-avatar">U</div>
                        <div class="user-dropdown" id="user-dropdown">
                            <div class="dropdown-header">
                                <div class="dropdown-avatar" id="dropdown-avatar-char">U</div>
                                <div class="dropdown-user-info">
                                    <span class="dropdown-name" id="user-display-name">使用者</span>
                                    <span class="dropdown-badge">Free</span>
                                </div>
                            </div>
                            <div class="dropdown-divider"></div>
                            <a href="#" class="dropdown-item" id="menu-profile">
                                <i data-lucide="user"></i>
                                <span>會員資料</span>
                            </a>
                            <a href="#" class="dropdown-item" id="menu-password">
                                <i data-lucide="key-round"></i>
                                <span>修改密碼</span>
                            </a>
                            <a href="#" class="dropdown-item" id="menu-settings">
                                <i data-lucide="settings"></i>
                                <span>偏好設定</span>
                            </a>
                            <a href="#" class="dropdown-item" id="menu-usage">
                                <i data-lucide="activity"></i>
                                <span>用量統計</span>
                            </a>
                            <div class="dropdown-divider"></div>
                            <a href="#" class="dropdown-item danger" id="menu-delete">
                                <i data-lucide="trash-2"></i>
                                <span>刪除帳號</span>
                            </a>
                            <a href="#" class="dropdown-item" id="menu-logout">
                                <i data-lucide="log-out"></i>
                                <span>登出</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <div id="chat-messages" class="chat-messages">
                <!-- 歡迎畫面 -->
                <div class="welcome-hero">
                    <h1>您今天想研究哪檔股票？</h1>
                    <p>我具備即時搜尋與分析能力，能為您追蹤供應鏈動向。</p>
                </div>
            </div>

            <!-- 輸入區塊 -->
            <footer class="chat-input-area">
                <div class="input-container">
                    <div class="toolbar">
                        <div class="tool-settings">
                            <button id="tool-toggle-btn" class="tool-btn" title="切換工具權限">
                                <i data-lucide="settings-2"></i>
                            </button>
                            <div id="tool-popover" class="tool-popover hidden">
                                <h5>工具權限控制</h5>
                                <label><input type="checkbox" id="tool-auto" checked> 自動 (Smart Mode)</label>
                                <div id="manual-tools" class="disabled-group">
                                    <label><input type="checkbox" class="tool-check" value="search_stock_news"> 股市新聞搜尋</label>
                                    <label><input type="checkbox" class="tool-check" value="search_market_ai_analysis"> 市場報告分析</label>
                                    <label><input type="checkbox" class="tool-check" value="get_market_recommendations"> 推薦名單提取</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <textarea id="user-input" placeholder="問問台積電的供應商風險..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">
                        <i data-lucide="arrow-up"></i>
                    </button>
                </div>
                <p class="disclaimer">AI 產出僅供參考，不構成投資建議。</p>
            </footer>
        </main>
    </div>

    <!-- ========== Modals ========== -->

    <!-- 個人資料 Modal -->
    <div class="modal-overlay" id="profile-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i data-lucide="user"></i> 會員資料</h3>
                <button class="modal-close" onclick="closeAllModals()"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>電子信箱</label>
                    <input type="email" id="profile-email" disabled>
                </div>
                <div class="modal-field">
                    <label>使用者名稱</label>
                    <input type="text" id="profile-username" placeholder="輸入新的名稱">
                </div>
                <div class="modal-info-row">
                    <span class="info-label">帳號狀態</span>
                    <span class="info-value" id="profile-status">active</span>
                </div>
                <div class="modal-info-row">
                    <span class="info-label">訂閱方案</span>
                    <span class="info-value" id="profile-tier">Free</span>
                </div>
                <div id="profile-msg" class="modal-msg"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeAllModals()">取消</button>
                <button class="modal-btn primary" onclick="saveProfile()">儲存變更</button>
            </div>
        </div>
    </div>

    <!-- 修改密碼 Modal -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i data-lucide="key-round"></i> 修改密碼</h3>
                <button class="modal-close" onclick="closeAllModals()"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>目前密碼</label>
                    <input type="password" id="pw-old" placeholder="輸入目前密碼">
                </div>
                <div class="modal-field">
                    <label>新密碼</label>
                    <input type="password" id="pw-new" placeholder="至少 8 個字元">
                </div>
                <div class="modal-field">
                    <label>確認新密碼</label>
                    <input type="password" id="pw-confirm" placeholder="再次輸入新密碼">
                </div>
                <div id="password-msg" class="modal-msg"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeAllModals()">取消</button>
                <button class="modal-btn primary" onclick="savePassword()">更新密碼</button>
            </div>
        </div>
    </div>

    <!-- 刪除帳號 Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-card danger">
            <div class="modal-header">
                <h3><i data-lucide="alert-triangle"></i> 刪除帳號</h3>
                <button class="modal-close" onclick="closeAllModals()"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <p class="danger-text">此操作將永久刪除您的帳號及所有關聯資料，且<strong>無法復原</strong>。</p>
                <div class="modal-field">
                    <label>請輸入「DELETE」以確認刪除</label>
                    <input type="text" id="delete-confirm-input" placeholder="DELETE" oninput="checkDeleteConfirm()">
                </div>
                <div id="delete-msg" class="modal-msg"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeAllModals()">取消</button>
                <button class="modal-btn danger" id="delete-confirm-btn" onclick="confirmDeleteAccount()" disabled>永久刪除</button>
            </div>
        </div>
    </div>

    <!-- 腳本 -->
    <script src="../js/auth.js"></script>
    <script src="../js/index.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
