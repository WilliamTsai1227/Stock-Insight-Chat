<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Insight Chat | 登入</title>
    <meta name="description" content="登入 Stock Insight Chat，使用 AI 進行專業股市分析與投資研究。">
    <link rel="stylesheet" href="/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- 背景動態粒子效果 -->
    <div class="bg-grid"></div>

    <div class="auth-container">
        <!-- 左側品牌區 -->
        <div class="brand-panel">
            <div class="brand-content">
                <div class="brand-logo">
                    <i data-lucide="trending-up" class="brand-icon"></i>
                    <h1>StockInsight</h1>
                </div>
                <p class="brand-tagline">AI 驅動的專業級股市分析平台</p>
                <div class="brand-features">
                    <div class="feature-item">
                        <i data-lucide="zap"></i>
                        <span>即時新聞與市場情緒分析</span>
                    </div>
                    <div class="feature-item">
                        <i data-lucide="shield-check"></i>
                        <span>安全的帳戶與資料保護</span>
                    </div>
                    <div class="feature-item">
                        <i data-lucide="bar-chart-3"></i>
                        <span>供應鏈追蹤與推薦引擎</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右側表單區 -->
        <div class="form-panel">
            <!-- 登入表單 -->
            <div id="login-form" class="auth-form active">
                <h2>歡迎回來</h2>
                <p class="form-subtitle">登入以繼續您的投資研究</p>

                <div id="login-error" class="error-msg hidden"></div>

                <div class="input-group">
                    <label for="login-email">電子信箱</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-password">密碼</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="login-password" placeholder="輸入您的密碼" autocomplete="current-password" required>
                        <button type="button" class="toggle-pw" id="toggle-login-pw">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <button id="login-btn" class="primary-btn">
                    <span>登入</span>
                    <div class="btn-loader hidden"><span></span><span></span><span></span></div>
                </button>

                <div class="form-divider">
                    <span>或</span>
                </div>

                <button class="social-btn" disabled title="即將推出">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span>以 Google 帳號登入</span>
                </button>

                <p class="switch-text">
                    還沒有帳號？ <a href="#" id="show-register">立即註冊</a>
                </p>
            </div>

            <!-- 註冊表單 -->
            <div id="register-form" class="auth-form">
                <h2>建立帳號</h2>
                <p class="form-subtitle">加入 StockInsight 開始您的研究之旅</p>

                <div id="register-error" class="error-msg hidden"></div>
                <div id="register-success" class="success-msg hidden"></div>

                <div class="input-group">
                    <label for="reg-username">使用者名稱</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="reg-username" placeholder="您的暱稱" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-email">電子信箱</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">密碼</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="reg-password" placeholder="至少 8 個字元" autocomplete="new-password" required>
                        <button type="button" class="toggle-pw" id="toggle-reg-pw">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="pw-strength">
                        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                        <span class="strength-text" id="strength-text"></span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password-confirm">確認密碼</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="reg-password-confirm" placeholder="再次輸入密碼" autocomplete="new-password" required>
                    </div>
                </div>

                <button id="register-btn" class="primary-btn">
                    <span>註冊</span>
                    <div class="btn-loader hidden"><span></span><span></span><span></span></div>
                </button>

                <p class="switch-text">
                    已經有帳號？ <a href="#" id="show-login">返回登入</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/js/api-config.js"></script>
    <script src="/js/login.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
